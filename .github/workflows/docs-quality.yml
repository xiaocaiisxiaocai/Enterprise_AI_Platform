name: Repository quality

on:
  push:
    paths:
      - "**/*.md"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "global.json"
      - "Directory.Build.props"
      - ".github/workflows/docs-quality.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "global.json"
      - "Directory.Build.props"
      - ".github/workflows/docs-quality.yml"

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Run validator regression tests and repository checks
        shell: pwsh
        run: ./scripts/Validate-Docs.ps1 -SelfTest

  gate-f-poc:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Verify Gate F and export evidence
        shell: pwsh
        run: ./scripts/Export-GateFEvidence.ps1 -OutputPath artifacts/gate-f-evidence.json -RequireCleanWorktree
      - name: Upload Gate F evidence
        uses: actions/upload-artifact@v7
        with:
          name: gate-f-evidence-${{ github.sha }}
          path: artifacts/gate-f-evidence.json
          if-no-files-found: error
